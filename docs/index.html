<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEE ME LIVE – Upcoming Shows</title>

    <!-- CloudKit JS CDN -->
    <script src="https://cdn.apple-cloudkit.com/ck/2/cloudkit.js"></script>

    <style>
        /* ============================================================
           SEE ME LIVE – Public Calendar Styles
           Old-school calendar / notepad warm parchment theme.
           ============================================================ */

        :root {
            --accent: #B24E38;
            --accent-light: #C96B4F;
            --accent-glow: rgba(178, 78, 56, 0.12);
            --bg: #F5E7D0;
            --card-bg: #FEF3E0;
            --text: #3B2F2F;
            --text-secondary: #7A6B5D;
            --border: #E0CDB5;
            --shadow: rgba(60, 40, 20, 0.08);
            --success: #5A8A4A;
            --rule-line: rgba(178, 78, 56, 0.10);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --accent: #CC7057;
                --accent-light: #D98E70;
                --accent-glow: rgba(204, 112, 87, 0.18);
                --bg: #251E1C;
                --card-bg: #352C28;
                --text: #EDE0D4;
                --text-secondary: #A89888;
                --border: #4A3D35;
                --shadow: rgba(0, 0, 0, 0.3);
                --rule-line: rgba(204, 112, 87, 0.08);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                         "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            background-image:
                repeating-linear-gradient(
                    to bottom,
                    transparent 0px,
                    transparent 31px,
                    var(--rule-line) 31px,
                    var(--rule-line) 32px
                );
            background-size: 100% 32px;
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Header */
        header {
            text-align: center;
            padding: 48px 20px 32px;
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            position: relative;
            overflow: hidden;
            border-bottom: 4px solid rgba(0,0,0,0.15);
            box-shadow: 0 2px 12px var(--shadow);
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent 0px,
                transparent 3px,
                rgba(255,255,255,0.03) 3px,
                rgba(255,255,255,0.03) 4px
            );
            pointer-events: none;
        }

        header .logo {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        header .subtitle {
            font-size: 1rem;
            opacity: 0.85;
            margin-top: 4px;
            font-weight: 400;
        }

        /* Main content */
        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 0 16px 80px;
        }

        /* Status messages */
        #loading, #error, #empty {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-secondary);
        }

        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error {
            color: var(--accent);
            font-weight: 500;
        }

        #empty {
            font-size: 1.1rem;
        }

        #empty .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block;
        }

        /* Month Group */
        .month-group {
            margin-top: 28px;
        }

        .month-group h2 {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 12px;
            padding-left: 4px;
        }

        /* Show Card */
        .show-card {
            background: var(--card-bg);
            border-radius: 4px;
            padding: 16px 16px 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 1px 3px var(--shadow), 0 4px 12px var(--shadow);
            display: flex;
            gap: 14px;
            align-items: flex-start;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            cursor: default;
            border-left: 3px solid var(--accent);
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .show-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px var(--shadow), 0 8px 24px var(--shadow);
        }

        .show-card .flyer {
            width: 72px;
            height: 72px;
            border-radius: 4px;
            object-fit: cover;
            cursor: pointer;
            flex-shrink: 0;
            background: var(--accent-glow);
            transition: transform 0.15s ease;
            border: 1px solid var(--border);
        }

        .show-card .flyer:hover {
            transform: scale(1.05);
        }

        .show-card .flyer-placeholder {
            width: 72px;
            height: 72px;
            border-radius: 4px;
            flex-shrink: 0;
            background: var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }

        .show-card .info {
            flex: 1;
            min-width: 0;
        }

        .show-card .title {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .show-card .role-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 2px 8px;
            border-radius: 3px;
            margin-top: 4px;
        }

        .show-card .meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 14px;
        }

        .show-card .meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .show-card .ticket-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            padding: 8px 18px;
            background: var(--accent);
            color: #fff;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.82rem;
            transition: opacity 0.15s, transform 0.15s;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .show-card .ticket-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .show-card .ticket-btn:active {
            transform: scale(0.97);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            cursor: pointer;
            animation: fadeIn 0.2s ease;
        }

        .lightbox img {
            max-width: 92vw;
            max-height: 92vh;
            border-radius: 4px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 32px 20px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            background: none;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        /* Mobile */
        @media (max-width: 500px) {
            header h1 { font-size: 1.6rem; }
            .show-card { flex-direction: column; }
            .show-card .flyer { width: 100%; height: 180px; border-radius: 4px; }
            .show-card .flyer-placeholder { width: 100%; height: 120px; border-radius: 4px; font-size: 2.4rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">📋 SEE ME LIVE</div>
        <h1>Upcoming Shows</h1>
        <p class="subtitle">Your personal gig calendar</p>
    </header>

    <div class="container">
        <!-- Calendar Subscription Section -->
        <div id="subscriptionSection" style="display:none; background: var(--accent-glow); border-left: 4px solid var(--accent); padding: 20px; border-radius: 4px; margin-bottom: 24px; margin-top: 16px;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                <span style="font-size: 1.4rem;">📅</span>
                <div>
                    <strong>Add to your calendar</strong>
                    <p style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 2px;">Subscribe to get automatic updates on your calendar app</p>
                </div>
            </div>
            <div id="calendarButtons" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <span>Loading shows…</span>
        </div>
        <div id="error" style="display:none;"></div>
        <div id="empty" style="display:none;">
            <span class="empty-icon">🎭</span>
            No upcoming shows right now.<br>Check back soon!
        </div>
        <div id="shows" style="display:none;"></div>
    </div>

    <div class="footer">
        Powered by <a href="#">SEE ME LIVE</a>
    </div>

    <script>
    // ================================================================
    // CloudKit JS Configuration
    // ================================================================

    const CONTAINER_ID  = 'iCloud.comedy.SEE-ME-LIVE';
    const API_TOKEN     = '973fea23642dcde5150a44716fa5b34bc7b1d4502f37851654e926d675fe7132';
    const ENVIRONMENT   = 'production';

    const params = new URLSearchParams(window.location.search);
    const userID = params.get('user');

    if (!userID) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent =
            'No user ID provided. Use a link from the SEE ME LIVE app.';
    } else {
        setupCalendarSubscription(userID);
        initCloudKit();
    }

    function setupCalendarSubscription(userID) {
        const section = document.getElementById('subscriptionSection');
        const buttonsContainer = document.getElementById('calendarButtons');
        section.style.display = 'block';

        // Generate calendar feed URL
        const baseURL = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
        const calendarFeedURL = baseURL + '/calendar.ics?user=' + encodeURIComponent(userID);
        const webcalURL = 'webcal://' + calendarFeedURL.substring(8); // Replace https:// with webcal://

        // Apple Calendar button
        const appleBtn = document.createElement('a');
        appleBtn.href = webcalURL;
        appleBtn.className = 'ticket-btn';
        appleBtn.style.cssText = 'background: #555; color: white; text-decoration: none; padding: 8px 16px; border-radius: 4px; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 6px;';
        appleBtn.textContent = '🍎 Apple Calendar';
        buttonsContainer.appendChild(appleBtn);

        // Google Calendar button
        const googleBtn = document.createElement('a');
        const googleCalendarURL = 'https://calendar.google.com/calendar/u/0/r?cid=' + encodeURIComponent(calendarFeedURL);
        googleBtn.href = googleCalendarURL;
        googleBtn.target = '_blank';
        googleBtn.className = 'ticket-btn';
        googleBtn.style.cssText = 'background: #EA4335; color: white; text-decoration: none; padding: 8px 16px; border-radius: 4px; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 6px;';
        googleBtn.textContent = '📧 Google Calendar';
        buttonsContainer.appendChild(googleBtn);

        // Direct link button
        const linkBtn = document.createElement('button');
        linkBtn.className = 'ticket-btn';
        linkBtn.style.cssText = 'background: var(--accent); color: white; border: none; cursor: pointer; padding: 8px 16px; border-radius: 4px; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 6px;';
        linkBtn.textContent = '🔗 Copy Feed Link';
        linkBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(calendarFeedURL);
            linkBtn.textContent = '✓ Copied!';
            setTimeout(() => {
                linkBtn.textContent = '🔗 Copy Feed Link';
            }, 2000);
        });
        buttonsContainer.appendChild(linkBtn);
    }

    async function initCloudKit() {
        try {
            CloudKit.configure({
                containers: [{
                    containerIdentifier: CONTAINER_ID,
                    apiTokenAuth: { apiToken: API_TOKEN, persist: false },
                    environment: ENVIRONMENT
                }]
            });

            const container = CloudKit.getDefaultContainer();
            const db = container.publicCloudDatabase;

            const query = {
                recordType: 'PublicShow',
                filterBy: [{
                    systemFieldName: undefined,
                    fieldName: 'userID',
                    comparator: 'EQUALS',
                    fieldValue: { value: userID }
                }],
                sortBy: [{ fieldName: 'date', ascending: true }]
            };

            const response = await db.performQuery(query);

            document.getElementById('loading').style.display = 'none';

            if (!response.records || response.records.length === 0) {
                document.getElementById('empty').style.display = 'block';
                return;
            }

            const now = new Date();
            const shows = response.records
                .map(r => recordToShow(r))
                .filter(s => s.date >= now)
                .sort((a, b) => a.date - b.date);

            if (shows.length === 0) {
                document.getElementById('empty').style.display = 'block';
                return;
            }

            renderShows(shows);

        } catch (err) {
            console.error('CloudKit error:', err);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent =
                'Failed to load shows. Please try again later.';
        }
    }

    function recordToShow(record) {
        const f = record.fields;
        return {
            title:      f.title      ? f.title.value      : '',
            role:       f.role       ? f.role.value        : '',
            venue:      f.venue      ? f.venue.value       : '',
            date:       f.date       ? new Date(f.date.value) : new Date(),
            price:      f.price      ? f.price.value       : 0,
            ticketLink: f.ticketLink ? f.ticketLink.value  : '',
            notes:      f.notes      ? f.notes.value       : '',
            flyerURL:   f.flyer      ? f.flyer.value.downloadURL : null
        };
    }

    function renderShows(shows) {
        const container = document.getElementById('shows');
        container.style.display = 'block';

        const grouped = {};
        shows.forEach(show => {
            const key = show.date.toLocaleString('default', {
                month: 'long', year: 'numeric'
            });
            if (!grouped[key]) grouped[key] = [];
            grouped[key].push(show);
        });

        for (const [month, items] of Object.entries(grouped)) {
            const group = document.createElement('div');
            group.className = 'month-group';

            const h2 = document.createElement('h2');
            h2.textContent = month;
            group.appendChild(h2);

            items.forEach(show => {
                group.appendChild(createShowCard(show));
            });

            container.appendChild(group);
        }
    }

    function createShowCard(show) {
        const card = document.createElement('div');
        card.className = 'show-card';

        // Flyer thumbnail
        if (show.flyerURL) {
            const img = document.createElement('img');
            img.className = 'flyer';
            img.src = show.flyerURL;
            img.alt = show.title + ' flyer';
            img.loading = 'lazy';
            img.addEventListener('click', () => openLightbox(show.flyerURL));
            card.appendChild(img);
        } else {
            const placeholder = document.createElement('div');
            placeholder.className = 'flyer-placeholder';
            placeholder.textContent = '🎵';
            card.appendChild(placeholder);
        }

        // Info block
        const info = document.createElement('div');
        info.className = 'info';

        const titleEl = document.createElement('div');
        titleEl.className = 'title';
        titleEl.textContent = show.title;
        info.appendChild(titleEl);

        if (show.role) {
            const roleBadge = document.createElement('span');
            roleBadge.className = 'role-badge';
            roleBadge.textContent = show.role;
            info.appendChild(roleBadge);
        }

        const meta = document.createElement('div');
        meta.className = 'meta';

        const dateSpan = document.createElement('span');
        dateSpan.textContent = '📅 ' + show.date.toLocaleDateString(undefined, {
            weekday: 'short', month: 'short', day: 'numeric'
        }) + ' · ' + show.date.toLocaleTimeString(undefined, {
            hour: 'numeric', minute: '2-digit'
        });
        meta.appendChild(dateSpan);

        if (show.venue) {
            const venueSpan = document.createElement('span');
            venueSpan.textContent = '📍 ' + show.venue;
            meta.appendChild(venueSpan);
        }

        if (show.price > 0) {
            const priceSpan = document.createElement('span');
            priceSpan.textContent = '💰 $' + show.price.toFixed(2);
            meta.appendChild(priceSpan);
        } else {
            const freeSpan = document.createElement('span');
            freeSpan.textContent = '✨ Free';
            meta.appendChild(freeSpan);
        }

        info.appendChild(meta);

        if (show.ticketLink) {
            const btn = document.createElement('a');
            btn.className = 'ticket-btn';
            btn.href = show.ticketLink;
            btn.target = '_blank';
            btn.rel = 'noopener';
            btn.textContent = '🎟 Get Tickets';
            info.appendChild(btn);
        }

        card.appendChild(info);
        return card;
    }

    function openLightbox(url) {
        const lb = document.createElement('div');
        lb.className = 'lightbox';
        lb.addEventListener('click', () => lb.remove());

        const img = document.createElement('img');
        img.src = url;
        lb.appendChild(img);

        document.body.appendChild(lb);
    }
    </script>
</body>
</html>
